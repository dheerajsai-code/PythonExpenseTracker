{% extends "base.html" %}

{% block title %}Edit Expense | Expense Tracker{% endblock %}

{% block content %}
<section class="panel form-panel">
    <div class="panel-header">
        <div>
            <p class="eyebrow">Update Entry</p>
            <h2>Edit expense #{{ expense.id }}</h2>
        </div>
    </div>

    <form method="post" class="expense-form">
        <label>
            Amount
            <input
                type="number"
                step="0.01"
                min="0.01"
                name="amount"
                value="{{ form_data.get('amount', '') }}"
                required
            >
        </label>

        <label>
            Category
            <input
                type="text"
                name="category"
                value="{{ form_data.get('category', '') }}"
                required
            >
        </label>

        <label>
            Date
            <input
                type="date"
                name="date"
                value="{{ form_data.get('date', '') }}"
                required
            >
        </label>

        <label>
            Description
            <textarea
                name="description"
                rows="4"
                required
            >{{ form_data.get('description', '') }}</textarea>
        </label>

        <div class="form-actions">
            <a href="{{ url_for('index') }}" class="secondary-link">Cancel</a>
            <button type="submit">Update Expense</button>
        </div>
    </form>
</section>
{% endblock %}
