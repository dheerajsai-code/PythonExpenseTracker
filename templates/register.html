{% extends "base.html" %}

{% block title %}Register | Expense Tracker{% endblock %}

{% block content %}
<section class="panel form-panel">
    <div class="panel-header">
        <div>
            <p class="eyebrow">Get Started</p>
            <h2>Create a new account</h2>
        </div>
    </div>

    <form method="post" class="expense-form">
        <label>
            Username
            <input
                type="text"
                name="username"
                value="{{ form_data.get('username', '') }}"
                autocomplete="username"
                required
            >
        </label>

        <label>
            Password
            <input
                type="password"
                name="password"
                autocomplete="new-password"
                required
            >
        </label>

        <label>
            Confirm Password
            <input
                type="password"
                name="confirm_password"
                autocomplete="new-password"
                required
            >
        </label>

        <div class="form-actions">
            <button type="submit">Create Account</button>
        </div>
    </form>

    <div class="form-footer" style="margin-top: 1.5rem; color: var(--muted); font-size: 0.95rem;">
        Already have an account? <a href="{{ url_for('login') }}" style="color: var(--accent); text-decoration: underline;">Log in here</a>
    </div>
</section>
{% endblock %}
